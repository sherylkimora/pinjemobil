<!DOCTYPE html>
<html>

<head>
    <title>Pinjem Mobil - Demo UI</title>
    <link rel="stylesheet" href="assets/style.css">

    <style>
        .demo-note {
            background: #eef2ff;
            color: #3730a3;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .demo-login {
            margin-top: 18px;
            color: #6b7280;
            font-size: 13px;
            line-height: 1.7;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-wrapper">
        <div class="login-brand">
            <h1>Pinjem Mobil</h1>
            <p>Pinjem Dulu, Balikin Nanti!</p>
        </div>

        <div class="login-card">
            <h2>Login Demo</h2>

            <div class="demo-note">
                Ini adalah versi demo UI static. Tombol login langsung masuk ke dashboard tanpa database.
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" class="form-control" value="alicia01">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" value="Alicia1!">
            </div>

            <a href="dashboard.html" class="btn btn-full">
                Login
            </a>

            <div class="demo-login">
                Demo akun: alicia01 / Alicia1!<br>
                Versi asli berjalan lokal menggunakan PHP dan SQL Server.
            </div>
        </div>
    </div>

</body>

</html>
