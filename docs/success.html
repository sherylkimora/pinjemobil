<!DOCTYPE html>
<html>

<head>
    <title>Payment Success - Pinjem Mobil</title>
    <link rel="stylesheet" href="assets/style.css">

    <style>
        body {
            background: #f4f7fb;
        }

        .success-card {
            max-width: 430px;
            margin: 70px auto;
            background: white;
            border-radius: 28px;
            padding: 36px;
            text-align: center;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        }

        .check {
            width: 110px;
            height: 110px;
            border-radius: 999px;
            background: #22c55e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 26px;
            font-size: 56px;
            font-weight: bold;
        }

        .success-card h1 {
            margin-bottom: 12px;
            color: #111827;
        }

        .success-card p {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 28px;
        }
    </style>
</head>

<body>

    <div class="success-card">
        <div class="check">✓</div>

        <h1>Payment Success!</h1>
        <p>
            Pembayaran berhasil dilakukan. Status peminjaman akan menunggu pengecekan awal oleh pegawai.
        </p>

        <a href="riwayat.html" class="btn btn-full">Lihat Riwayat</a>
        <br><br>
        <a href="dashboard.html" class="btn btn-secondary">Kembali ke Dashboard</a>
    </div>

</body>

</html>
